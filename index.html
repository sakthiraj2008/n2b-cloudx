<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N2B Cloud | Personal Storage</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #22d3ee; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .file-card { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; }
        .btn { background: var(--primary); color: #000; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 80%; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="glass" style="text-align: center; width: 300px;">
        <h2>N2B Cloud</h2>
        <input type="password" id="passInput" placeholder="Access Password">
        <button class="btn" onclick="login()">Enter</button>
    </div>
</div>

<div id="main-content" style="display:none;" class="container">
    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h1>My Files</h1>
        <a href="https://t.me/YourBotUsername" target="_blank" class="btn">Upload via Telegram</a>
    </header>
    <div class="file-grid" id="fileGrid"></div>
</div>

<script>
    let supabaseClient;
    const config = { /* Replace with actual values or fetch from config.json */
        url: "YOUR_SUPABASE_URL",
        key: "YOUR_SUPABASE_ANON_KEY",
        pass: "YOUR_ADMIN_PASSWORD"
    };

    function login() {
        if(document.getElementById('passInput').value === config.pass) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            initSupabase();
        } else { alert("Wrong Password"); }
    }

    async function initSupabase() {
        supabaseClient = supabase.createClient(config.url, config.key);
        const { data, error } = await supabaseClient.from('files').select('*').order('created_at', { ascending: false });
        if (data) renderFiles(data);
    }

    function renderFiles(files) {
        const grid = document.getElementById('fileGrid');
        grid.innerHTML = files.map(f => `
            <div class="file-card">
                <h3>${f.file_name}</h3>
                <p>${(f.file_size / 1024 / 1024).toFixed(2)} MB</p>
                <button class="btn" onclick="openFile('${f.telegram_file_id}')">View / Download</button>
            </div>
        `).join('');
    }

    function openFile(id) {
        window.location.href = `view.html?id=${id}`;
    }
</script>
</body>
</html>
