<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | N2B Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #0088cc;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        /* Floating background shapes */
        .shape {
            position: absolute;
            filter: blur(50px);
            z-index: 0;
            border-radius: 50%;
        }
        .s1 { width: 300px; height: 300px; background: var(--primary); top: -10%; left: -5%; }
        .s2 { width: 250px; height: 250px; background: #ff00cc; bottom: -5%; right: 5%; }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 40px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h2 { color: white; margin-bottom: 30px; letter-spacing: 2px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus { background: rgba(255,255,255,0.15); box-shadow: 0 0 10px var(--primary); }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,136,204,0.4); }
        .error { color: #ff4d4d; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="shape s1 animate__animated animate__pulse animate__infinite"></div>
    <div class="shape s2 animate__animated animate__pulse animate__infinite"></div>

    <div class="login-card animate__animated animate__fadeInDown">
        <h2>N2B CLOUD</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Enter System</button>
        <p id="errorMsg" class="error">Invalid login details!</p>
    </div>

    <script>
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMsg');

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });

            const data = await response.json();
            if(data.success) {
                // Store user plan and name in session
                sessionStorage.setItem('userData', JSON.stringify(data));
                window.location.href = 'index.html';
            } else {
                error.style.display = 'block';
                error.classList.add('animate__animated', 'animate__headShake');
                setTimeout(() => error.classList.remove('animate__headShake'), 500);
            }
        }
      async function uploadVideo() {
    const file = document.getElementById('videoInput').files[0];
    const bar = document.getElementById('barFill');
    const progContainer = document.getElementById('progContainer');
    const progText = document.getElementById('progText');

    if (!file) return;

    progContainer.style.display = 'block';
    
    // Using XMLHttpRequest instead of Fetch to track progress percentage
    const xhr = new XMLHttpRequest();
    const formData = new FormData();
    formData.append('video', file);
    formData.append('username', JSON.parse(sessionStorage.getItem('userData')).username);

    xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            bar.style.width = percent + '%';
            progText.textContent = `Uploading: ${percent}%`;
        }
    });

    xhr.onreadystatechange = () => {
        if (xhr.readyState === 4 && xhr.status === 200) {
            const res = JSON.parse(xhr.responseText);
            if(res.success) {
                alert("Upload Complete!");
                location.reload(); // Refresh to see history
            } else {
                alert("Error: " + res.error);
            }
        }
    };

    xhr.open('POST', '/api/upload', true);
    xhr.send(formData);
}
    </script>
</body>
</html>
